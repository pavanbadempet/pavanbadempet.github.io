<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: " en" }}">

{%- include head.html -%}

<body class="{% if page.layout == 'home' %} home{% endif %}{% if page.layout == 'post' %} blog{% endif %}">

  {%- include preloader.html -%}

  <!-- Container -->
  <div class="container">
    <!-- Cursor -->
    <div class="cursor-follower"></div>

    <!-- Header -->
    {% include header.html %}

    <!-- Wrapper -->
    <div class="wrapper" id="swup">
      {{ content }}
    </div>

    <!-- Footer -->
    {% include footer.html %}

    <!-- Lines -->
    <div class="lines">
      <div class="line-col"></div>
      <div class="line-col"></div>
      <div class="line-col"></div>
      <div class="line-col"></div>
      <div class="line-col"></div>
    </div>
  </div>

  <script src="{{ 'assets/js/swup.min.js' | relative_url }}"></script>
  {%- include scripts.html -%}

</body>

</html>
