<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

{%- include head.html -%}

<body class="{% if page.layout == 'home' %} home{% endif %}{% if page.layout == 'post' %} blog{% endif %}">

  {%- include preloader.html -%}

  <!-- Container -->
  <div class="container">
    <!-- Cursor -->
    <div class="cursor-follower"></div>

    {%- include header.html -%}

    <!-- Wrapper -->
    <div class="wrapper">
      {{ content }}
    </div>

    {%- include footer.html -%}

    <!-- Lines -->
    <div class="lines">
      <div class="content">
        <div class="line-col"></div>
        <div class="line-col"></div>
        <div class="line-col"></div>
        <div class="line-col"></div>
        <div class="line-col"></div>
      </div>
    </div>
  </div>

  {%- include scripts.html -%}
  <!-- AI Chat Bubble Trigger (Redirects directly to Agent View) -->
  <a href="{{ '/agent/' | relative_url }}" class="cmd-trigger ai-chat-bubble"
    title="Switch to Agent View">
    <span class="ai-bubble-icon">AI</span>
    <span class="ai-bubble-label">Agent View</span>
  </a>
  <style>
      @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap');

      .ai-chat-bubble {
          position: fixed;
          bottom: 30px;
          right: 30px;
          background: #4bffa5;
          color: #101010;
          width: 60px;
          height: 60px;
          border-radius: 30px;
          display: flex;
          align-items: center;
          justify-content: center; /* Centered by default */
          box-shadow: 0 4px 20px rgba(75, 255, 165, 0.4), 0 0 0 1px rgba(75, 255, 165, 0.2);
          z-index: 9999;
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
          overflow: hidden;
          text-decoration: none;
          box-sizing: border-box;
          white-space: nowrap;
      }
      .ai-bubble-icon {
          font-weight: 700;
          font-size: 1.05rem;
          letter-spacing: -0.03em;
          font-family: 'Syncopate', sans-serif; /* Wide premium tech logo font */
          transition: opacity 0.15s ease;
          flex-shrink: 0;
      }
      .ai-bubble-label {
          max-width: 0;
          opacity: 0;
          font-weight: 700;
          font-size: 0.82rem;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          margin-left: 0;
          transition: max-width 0.4s ease, opacity 0.3s ease, margin-left 0.4s ease;
          font-family: 'Space Grotesk', 'Inter', sans-serif;
          flex-shrink: 0;
      }
      .ai-chat-bubble:hover {
          width: 165px;
          justify-content: flex-start; /* Left-align content when expanded */
          padding-left: 20px; /* Indent content when expanded */
          transform: translateY(-5px);
          box-shadow: 0 8px 25px rgba(75, 255, 165, 0.6);
      }
      .ai-chat-bubble:hover .ai-bubble-label {
          max-width: 100px;
          opacity: 1;
          margin-left: 10px;
      }

      /* Seamless Expanding State for the Button itself */
      .ai-chat-bubble.expanding {
          transform: scale(80) !important;
          background: #050505 !important;
          transition: transform 0.65s cubic-bezier(0.65, 0, 0.35, 1) !important;
          z-index: 9999999 !important;
          box-shadow: none !important;
      }
      .ai-chat-bubble.expanding .ai-bubble-icon,
      .ai-chat-bubble.expanding .ai-bubble-label {
          opacity: 0 !important;
          transition: opacity 0.1s ease !important;
      }
  </style>

  <!-- Back to Top -->
  <a href="#" id="back-to-top" aria-label="Back to top">↑</a>

  {%- include command-palette.html -%}

  <script>
      document.addEventListener('DOMContentLoaded', function() {
          const bubble = document.querySelector('.ai-chat-bubble');
          if (bubble) {
              bubble.addEventListener('click', function(e) {
                  e.preventDefault();
                  const href = this.getAttribute('href');
                  
                  // Expand the button itself
                  this.classList.add('expanding');
                  
                  // Navigate to the next page when full screen is covered
                  setTimeout(() => {
                      window.location.href = href;
                  }, 580);
              });
          }
      });
  </script>
</body>
</html>
