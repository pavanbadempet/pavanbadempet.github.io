<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

{%- include head.html -%}

<body class="{% if page.layout == 'home' %} home{% endif %}{% if page.layout == 'post' %} blog{% endif %}">

  {%- include preloader.html -%}

  <!-- Container -->
  <div class="container">
    <!-- Cursor -->
    <div class="cursor-follower"></div>

    {%- include header.html -%}

    <!-- Wrapper -->
    <div class="wrapper">
      {{ content }}
    </div>

    {%- include footer.html -%}

    <!-- Lines -->
    <div class="lines">
      <div class="content">
        <div class="line-col"></div>
        <div class="line-col"></div>
        <div class="line-col"></div>
        <div class="line-col"></div>
        <div class="line-col"></div>
      </div>
    </div>
  </div>

  {%- include scripts.html -%}
  <!-- AI Chat Bubble Trigger -->
  <a href="#" class="cmd-trigger ai-chat-bubble"
    onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'key':'k', 'ctrlKey':true})); return false;"
    title="Ask AI Agent (Ctrl+K)"
    style="position: fixed; bottom: 30px; right: 30px; background: #4bffa5; color: #101010; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 20px rgba(75, 255, 165, 0.4), 0 0 0 1px rgba(75, 255, 165, 0.2); z-index: 9999; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
    <i class="fas fa-terminal"></i>
  </a>
  <style>
      .ai-chat-bubble:hover {
          transform: scale(1.1) translateY(-5px);
          box-shadow: 0 8px 25px rgba(75, 255, 165, 0.6);
      }
  </style>

  <!-- Back to Top -->
  <a href="#" id="back-to-top" aria-label="Back to top">↑</a>

  {%- include command-palette.html -%}

</body>

</html>
