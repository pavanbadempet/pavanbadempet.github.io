<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Pavan's AI Agent" }}</title>
  
  {%- include head.html -%}

  <style>
    /* Full Screen Premium Native App Overrides */
    body.agent-layout {
      background-color: #050505;
      color: #fff;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: transparent;
      z-index: 100;
    }

    .agent-header .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }
    
    .agent-header .logo span {
      background: linear-gradient(135deg, #20b2aa, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .agent-header a.classic-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }

    .agent-header a.classic-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .agent-main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Ambient Orb Animation */
    .ambient-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70vw;
      height: 70vw;
      max-width: 800px;
      max-height: 800px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0, 255, 204, 0.12) 0%, rgba(0, 136, 255, 0.04) 40%, transparent 70%);
      filter: blur(50px);
      z-index: 0;
      animation: breathe 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes breathe {
      0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    /* --- NATIVE APP UI OVERRIDES --- */
    
    /* Remove Overlay Restrictions */
    body.agent-layout .command-palette-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      backdrop-filter: none !important;
      display: flex !important;
      justify-content: center;
      align-items: center;
      opacity: 1 !important;
      padding: 0;
      z-index: 10;
    }

    /* Make the Modal a Native Flex Container */
    body.agent-layout .command-palette-modal {
      width: 100% !important;
      max-width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
      transform: none !important;
      opacity: 1 !important;
      background: transparent !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      padding: 0 20px;
    }

    /* Hide Clutter */
    body.agent-layout .cp-header, 
    body.agent-layout .cp-ai-toolbar,
    body.agent-layout .cp-footer-meta {
      display: none !important;
    }

    /* Reorder Components: Body -> Chips -> Footer */
    body.agent-layout .cp-body {
      order: 1 !important;
      flex: 1 !important;
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto !important;
      padding: 40px 0 20px 0 !important;
      overflow-y: auto !important;
      scrollbar-width: none; /* Firefox */
      /* Smooth fade out at the top */
      mask-image: linear-gradient(to bottom, transparent, black 10%, black);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black);
    }
    body.agent-layout .cp-body::-webkit-scrollbar { 
      display: none; 
    }
    
    /* Suggestion Chips */
    body.agent-layout .agent-chips {
      order: 2 !important;
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto !important;
      padding: 10px 0 20px 0 !important;
      display: flex !important;
      justify-content: center !important;
      flex-wrap: wrap !important;
      gap: 12px !important;
      border: none !important;
      background: transparent !important;
    }

    body.agent-layout .agent-chip {
      background: rgba(32, 178, 170, 0.05);
      color: #00ffcc;
      border: 1px solid rgba(32, 178, 170, 0.2);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 0 rgba(0, 255, 204, 0);
    }

    body.agent-layout .agent-chip:hover {
      background: rgba(0, 255, 204, 0.15);
      border-color: rgba(0, 255, 204, 0.8);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
    }

    /* Floating Premium Input Box */
    body.agent-layout .cp-footer {
      order: 3 !important;
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto 40px auto !important;
      background: rgba(25, 25, 30, 0.6) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 40px !important;
      padding: 8px !important;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05) !important;
      display: flex !important;
      align-items: center !important;
    }

    body.agent-layout .cp-composer {
      display: flex !important;
      width: 100% !important;
      background: transparent !important;
      border: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    body.agent-layout .cp-input-field {
      flex: 1 !important;
      background: transparent !important;
      border: none !important;
      color: #fff !important;
      padding: 12px 24px !important;
      font-size: 1.05rem !important;
      outline: none !important;
    }
    
    body.agent-layout .cp-input-field::placeholder {
      color: rgba(255, 255, 255, 0.4) !important;
    }

    /* Submit Button */
    body.agent-layout .cp-send {
      background: rgba(0, 255, 204, 0.15) !important;
      color: #00ffcc !important;
      border: none !important;
      border-radius: 50% !important;
      width: 44px !important;
      height: 44px !important;
      min-width: 44px !important;
      margin: 0 4px !important;
      cursor: pointer !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      transition: all 0.3s ease !important;
    }
    
    body.agent-layout .cp-send:hover {
      background: #00ffcc !important;
      color: #000 !important;
      transform: scale(1.05) !important;
      box-shadow: 0 0 15px rgba(0,255,204,0.4) !important;
    }

    /* Beautiful Chat Bubbles */
    body.agent-layout .cp-message {
      margin-bottom: 24px !important;
    }
    
    body.agent-layout .cp-message.bot .cp-avatar {
      background: rgba(0, 255, 204, 0.1) !important;
      color: #00ffcc !important;
      border: 1px solid rgba(0, 255, 204, 0.3) !important;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.1) !important;
    }
    
    body.agent-layout .cp-message.user .cp-text {
      background: rgba(255, 255, 255, 0.08) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 20px 20px 4px 20px !important;
      font-size: 1rem !important;
      padding: 12px 18px !important;
    }
    
    /* Hide the floating trigger button */
    body.agent-layout .cmd-trigger {
      display: none !important;
    }
  </style>
</head>

<body class="agent-layout">

  <header class="agent-header">
    <div class="logo">PAVAN<span>.AI</span></div>
    <a href="{{ '/classic/' | relative_url }}" class="classic-btn">
      <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Classic View
    </a>
  </header>

  <main class="agent-main">
    <div class="ambient-orb"></div>
    {{ content }}
  </main>

  {%- include scripts.html -%}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        const overlay = document.getElementById('command-palette');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.classList.add('open');
          
          // Show chips
          const chips = document.getElementById('cp-agent-chips');
          if (chips) chips.style.display = 'flex';

          // Replace default greeting
          const botMsgText = document.querySelector('.cp-message.bot .cp-text');
          if (botMsgText) {
            botMsgText.innerHTML = "<strong>Hello! I am the AI representation of Pavan Badempet, an elite Data & AI Engineer.</strong><br><br>My sole purpose is to prove why he is the perfect fit for your team. What kind of role are you hiring for?";
          }
          
          // Focus input
          const input = document.getElementById('cp-input');
          if (input) input.focus();
        }
      }, 100);
      
      // Handle chip clicks
      document.querySelectorAll('.agent-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          const input = document.getElementById('cp-input');
          const sendBtn = document.getElementById('cp-send-btn');
          if (input && sendBtn) {
            input.value = this.textContent;
            sendBtn.click();
            // Hide chips after first message
            const chips = document.getElementById('cp-agent-chips');
            if (chips) {
                chips.style.opacity = '0';
                setTimeout(() => chips.style.display = 'none', 300);
            }
          }
        });
      });
      
      // Also hide chips on normal enter
      const inputField = document.getElementById('cp-input');
      if (inputField) {
          inputField.addEventListener('keypress', function(e) {
              if (e.key === 'Enter' && this.value.trim() !== '') {
                  const chips = document.getElementById('cp-agent-chips');
                  if (chips) {
                      chips.style.opacity = '0';
                      setTimeout(() => chips.style.display = 'none', 300);
                  }
              }
          });
      }
    });
  </script>
</body>
</html>
