<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Pavan's AI Agent" }}</title>
  
  {%- include head.html -%}

  <style>
    /* Full Screen Premium Agent Overrides */
    body.agent-layout {
      background-color: #050505;
      color: #fff;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: transparent;
      z-index: 100;
    }

    .agent-header .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }
    
    .agent-header .logo span {
      background: linear-gradient(135deg, #20b2aa, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .agent-header a.classic-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }

    .agent-header a.classic-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .agent-main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Ambient Orb Animation */
    .ambient-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70vw;
      height: 70vw;
      max-width: 800px;
      max-height: 800px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0, 255, 204, 0.15) 0%, rgba(0, 136, 255, 0.05) 40%, transparent 70%);
      filter: blur(40px);
      z-index: 0;
      animation: breathe 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes breathe {
      0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    /* Force Command Palette to be full screen and glassmorphic */
    body.agent-layout .command-palette-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      backdrop-filter: none !important;
      display: flex !important;
      justify-content: center;
      align-items: center;
      opacity: 1 !important;
      padding: 0;
    }

    body.agent-layout .command-palette-modal {
      width: 100%;
      max-width: 850px;
      height: 90%;
      max-height: 900px;
      transform: none !important;
      opacity: 1 !important;
      /* Glassmorphism! */
      background: rgba(15, 15, 18, 0.7) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1) !important;
      border-radius: 20px;
      z-index: 10;
    }

    /* Hide close button */
    body.agent-layout .cp-close {
      display: none;
    }
    
    /* Make headers transparent inside glass */
    body.agent-layout .cp-header, 
    body.agent-layout .cp-ai-toolbar, 
    body.agent-layout .agent-chips {
      background: transparent !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
    }
    
    body.agent-layout .cp-footer {
      background: rgba(0,0,0,0.2) !important;
      border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 0 0 20px 20px;
    }

    /* Suggestion Chips */
    .agent-chips {
      display: flex;
      gap: 12px;
      padding: 15px 20px !important;
      overflow-x: auto;
    }
    
    /* Hide scrollbar for chips */
    .agent-chips::-webkit-scrollbar {
      display: none;
    }

    .agent-chip {
      background: rgba(32, 178, 170, 0.05);
      color: #00ffcc;
      border: 1px solid rgba(32, 178, 170, 0.2);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 0 rgba(0, 255, 204, 0);
    }

    .agent-chip:hover {
      background: rgba(0, 255, 204, 0.15);
      border-color: rgba(0, 255, 204, 0.8);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
    }
    
    /* Hide trigger */
    body.agent-layout .cmd-trigger {
      display: none !important;
    }
  </style>
</head>

<body class="agent-layout">

  <header class="agent-header">
    <div class="logo">PAVAN<span>.AI</span></div>
    <a href="{{ '/classic/' | relative_url }}" class="classic-btn">
      <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Classic View
    </a>
  </header>

  <main class="agent-main">
    <div class="ambient-orb"></div>
    {{ content }}
  </main>

  {%- include scripts.html -%}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        const overlay = document.getElementById('command-palette');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.classList.add('open');
          
          // Show chips
          const chips = document.getElementById('cp-agent-chips');
          if (chips) chips.style.display = 'flex';

          // Replace default greeting
          const botMsgText = document.querySelector('.cp-message.bot .cp-text');
          if (botMsgText) {
            botMsgText.innerHTML = "<strong>Hello! I am the AI representation of Pavan Badempet, an elite Data & AI Engineer.</strong><br><br>My sole purpose is to prove why he is the perfect fit for your team. What kind of role are you hiring for?";
          }
          
          // Focus input
          const input = document.getElementById('cp-input');
          if (input) input.focus();
        }
      }, 100);
      
      // Handle chip clicks
      document.querySelectorAll('.agent-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          const input = document.getElementById('cp-input');
          const sendBtn = document.getElementById('cp-send-btn');
          if (input && sendBtn) {
            input.value = this.textContent;
            sendBtn.click();
          }
        });
      });
    });
  </script>
</body>
</html>
