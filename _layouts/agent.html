<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Pavan's AI Agent" }}</title>
  
  {%- include head.html -%}

  <style>
    /* Full Screen Premium Native App Overrides */
    body.agent-layout {
      background-color: #050505;
      color: #fff;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: transparent;
      z-index: 100;
    }

    .agent-header .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }
    
    .agent-header .logo span {
      background: linear-gradient(135deg, #20b2aa, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .agent-header a.classic-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }

    .agent-header a.classic-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .agent-main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Ambient Orb Animation */
    .ambient-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70vw;
      height: 70vw;
      max-width: 800px;
      max-height: 800px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0, 255, 204, 0.12) 0%, rgba(0, 136, 255, 0.04) 40%, transparent 70%);
      filter: blur(50px);
      z-index: 0;
      animation: breathe 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes breathe {
      0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    /* --- HYPER-MINIMALIST UI OVERRIDES --- */
    
    /* Remove Overlay Restrictions */
    body.agent-layout .command-palette-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      display: flex !important;
      justify-content: center;
      align-items: center;
      opacity: 1 !important;
      padding: 0;
      z-index: 10;
    }

    body.agent-layout .command-palette-modal {
      width: 100% !important;
      max-width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
      transform: none !important;
      opacity: 1 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      padding: 0 20px;
    }

    /* Hide Clutter */
    body.agent-layout .cp-header, 
    body.agent-layout .cp-ai-toolbar,
    body.agent-layout .cp-footer-meta {
      display: none !important;
    }

    /* Reorder Components: Body -> Chips -> Footer */
    body.agent-layout .cp-body {
      order: 1 !important;
      flex: 1 !important;
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto !important;
      padding: 60px 0 20px 0 !important;
      overflow-y: auto !important;
      scrollbar-width: none;
      min-height: 0 !important; /* Fix scrolling in flex container */
    }
    body.agent-layout .cp-body::-webkit-scrollbar { 
      display: none; 
    }
    
    /* Minimalist Chips */
    body.agent-layout .agent-chips {
      order: 2 !important;
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto !important;
      padding: 10px 10px 20px 10px !important;
      display: flex !important;
      flex-direction: row !important; /* Horizontal layout */
      flex-wrap: nowrap !important; /* Keep cards in one row */
      overflow-x: auto !important; /* Enable swipe/scroll */
      gap: 12px !important;
      border: none !important;
      background: transparent !important;
      scrollbar-width: none; /* Hide scrollbar Firefox */
    }

    body.agent-layout .agent-chips::-webkit-scrollbar {
      display: none; /* Hide scrollbar Chrome/Safari */
    }

    body.agent-layout .agent-chip {
      background: rgba(255, 255, 255, 0.05) !important;
      color: #d0d0d0;
      border: 1px solid rgba(75, 255, 165, 0.2);
      border-left: 3px solid rgba(75, 255, 165, 0.5);
      padding: 12px 16px;
      border-radius: 12px;
      font-family: 'Space Grotesk', 'Inter', sans-serif !important;
      font-size: 0.82rem;
      font-weight: 400;
      line-height: 1.4;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
      width: 260px !important; /* Fixed width card */
      flex-shrink: 0 !important; /* Prevent squishing */
      margin-bottom: 0 !important;
      white-space: normal !important; /* Wrap text inside card */
    }

    body.agent-layout .agent-chip:hover {
      background: rgba(75, 255, 165, 0.08) !important;
      border-color: rgba(75, 255, 165, 0.5);
      border-left-color: #4bffa5 !important;
      color: #4bffa5;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(75, 255, 165, 0.15) !important;
    }

    /* Sleek Input Box */
    body.agent-layout .cp-footer {
      order: 3 !important;
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto 40px auto !important;
      background: rgba(255, 255, 255, 0.03) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      border-radius: 12px !important; /* Professional crisp edge */
      padding: 6px 6px 6px 16px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2) !important;
      display: flex !important;
      align-items: center !important;
      transition: box-shadow 0.3s ease, border-color 0.3s ease !important;
    }
    
    body.agent-layout .cp-footer:focus-within {
      border-color: rgba(255, 255, 255, 0.4) !important;
      box-shadow: 0 4px 25px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) !important;
    }

    body.agent-layout .cp-composer {
      display: flex !important;
      width: 100% !important;
      background: transparent !important;
      border: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    body.agent-layout .cp-input-field {
      flex: 1 !important;
      background: transparent !important;
      border: none !important;
      color: #fff !important;
      padding: 10px 0 !important;
      font-size: 1rem !important;
      outline: none !important;
      font-weight: 400 !important;
    }
    
    body.agent-layout .cp-input-field::placeholder {
      color: rgba(255, 255, 255, 0.3) !important;
    }

    /* Minimalist Submit Button */
    body.agent-layout .cp-send {
      background: transparent !important;
      color: #888 !important;
      border: none !important;
      border-radius: 8px !important;
      width: 40px !important;
      height: 40px !important;
      min-width: 40px !important;
      margin: 0 !important;
      cursor: pointer !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      transition: all 0.2s ease !important;
    }
    
    body.agent-layout .cp-send:hover {
      background: rgba(255,255,255,0.1) !important;
      color: #fff !important;
    }

    /* Clean Chat Bubbles */
    body.agent-layout .cp-message {
      margin-bottom: 24px !important;
      display: flex !important;
      align-items: flex-start !important;
      gap: 12px !important;
    }
    
    /* Bot Message */
    body.agent-layout .cp-message.bot {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }
    
    body.agent-layout .cp-message.bot .cp-avatar {
      background: transparent !important;
      color: #fff !important;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      border-radius: 6px !important;
      width: 32px !important;
      height: 32px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      box-shadow: none !important;
    }
    
    body.agent-layout .cp-message.bot .cp-text {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      font-size: 1rem !important;
      line-height: 1.6 !important;
      color: #e0e0e0 !important;
      margin-top: 4px !important;
    }

    /* Override blockquotes for bot messages in agent layout */
    body.agent-layout .cp-message.bot .cp-text blockquote {
      margin: 16px 0 !important;
      padding: 14px 18px !important;
      background: rgba(75, 255, 165, 0.05) !important;
      border: 1px solid rgba(75, 255, 165, 0.2) !important;
      border-radius: 8px !important;
      border-left: 3px solid #4bffa5 !important;
      color: #4bffa5 !important;
      font-family: 'Space Grotesk', 'Inter', sans-serif !important;
      font-size: 0.95em !important;
      font-style: normal !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
    }
    
    body.agent-layout .cp-message.bot .cp-text blockquote:hover {
      background: rgba(75, 255, 165, 0.1) !important;
      border-color: rgba(75, 255, 165, 0.4) !important;
    }
    
    /* User Message */
    body.agent-layout .cp-message.user {
      flex-direction: row-reverse !important;
    }
    
    body.agent-layout .cp-message.user .cp-avatar {
      display: none !important;
    }
    
    body.agent-layout .cp-message.user .cp-text {
      background: rgba(255, 255, 255, 0.08) !important;
      border: none !important;
      border-radius: 12px 12px 2px 12px !important;
      font-size: 1rem !important;
      padding: 10px 16px !important;
      color: #fff !important;
    }
    
    /* Hide the floating trigger button */
    body.agent-layout .cmd-trigger {
      display: none !important;
    }
  </style>
</head>

<body class="agent-layout">

  <header class="agent-header">
    <div class="logo">PAVAN<span>.AI</span></div>
    <a href="{{ '/classic/' | relative_url }}" class="classic-btn">
      <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Classic View
    </a>
  </header>

  <main class="agent-main">
    <canvas id="matrix-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0.08;"></canvas>
    <div class="ambient-orb"></div>
    {{ content }}
  </main>

  {%- include scripts.html -%}

  <script>
    // Global function called by command-palette.html after receiving a message
    window.renderDynamicChips = function(suggestions) {
        const container = document.getElementById('cp-agent-chips');
        if (!container) return;
        
        container.innerHTML = ''; // clear old chips
        
        if (!suggestions || suggestions.length === 0) {
            container.style.display = 'none';
            return;
        }
        
        suggestions.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'agent-chip';
            btn.textContent = text;
            btn.addEventListener('click', function() {
                const input = document.getElementById('cp-input');
                const sendBtn = document.getElementById('cp-send-btn');
                if (input && sendBtn) {
                    input.value = text;
                    sendBtn.click();
                    container.style.opacity = '0';
                    setTimeout(() => container.style.display = 'none', 300);
                }
            });
            container.appendChild(btn);
        });
        
        container.style.display = 'flex';
        // brief timeout to allow display:flex to apply before fading in
        setTimeout(() => {
            container.style.opacity = '1';
        }, 50);
    };

    // Subtle Binary Matrix Rain background (Data Engineering aesthetic)
    (function() {
      const canvas = document.getElementById('matrix-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;
      
      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      const alphabet = "01";
      const fontSize = 16;
      const columns = width / fontSize;
      const rainDrops = [];

      for (let x = 0; x < columns; x++) {
        rainDrops[x] = Math.random() * -100; // staggered entry
      }

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = 'rgba(75, 255, 165, 0.35)'; // match theme color but transparent
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < rainDrops.length; i++) {
          const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
          const x = i * fontSize;
          const y = rainDrops[i] * fontSize;
          
          if (y > 0) {
            ctx.fillText(text, x, y);
          }

          if (y > height && Math.random() > 0.985) {
            rainDrops[i] = 0;
          }
          rainDrops[i]++;
        }
      }
      setInterval(draw, 33);
    })();

    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        const overlay = document.getElementById('command-palette');
        if (overlay) {
          overlay.style.display = 'flex';
          overlay.classList.add('open');
          
          // Show initial chips
          const chips = document.getElementById('cp-agent-chips');
          if (chips) {
              chips.style.display = 'flex';
              chips.style.opacity = '1';
          }

          // Replace default greeting
          const botMsgText = document.querySelector('.cp-message.bot .cp-text');
          if (botMsgText) {
            botMsgText.innerHTML = "<strong>Hello! I am the AI representation of Pavan Badempet, an AI Data Engineer.</strong><br><br>My sole purpose is to prove why he is the perfect fit for your team. What kind of role are you hiring for?";
          }
          
          // Focus input
          const input = document.getElementById('cp-input');
          if (input) input.focus();
        }
      }, 100);
      
      // Bind initial hardcoded chips
      document.querySelectorAll('.agent-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          const input = document.getElementById('cp-input');
          const sendBtn = document.getElementById('cp-send-btn');
          if (input && sendBtn) {
            input.value = this.textContent;
            sendBtn.click();
            const chips = document.getElementById('cp-agent-chips');
            if (chips) {
                chips.style.opacity = '0';
                setTimeout(() => chips.style.display = 'none', 300);
            }
          }
        });
      });
    });
  </script>
</body>
</html>
