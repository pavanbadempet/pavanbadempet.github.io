<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pavan Badempet | Choose Your Experience</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body, html {
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background-color: #0f0f11;
      color: #fff;
    }
    
    .gateway-container {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    
    .gateway-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: flex 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }
    
    .gateway-side:hover {
      flex: 1.2;
    }
    
    .gateway-side:hover .gateway-content {
      transform: scale(1.05);
    }
    
    .classic-side {
      background: #ffffff;
      color: #1a1a1a;
      border-right: 1px solid rgba(0,0,0,0.1);
    }
    
    .agent-side {
      background: #0f0f11;
      background-image: radial-gradient(circle at center, rgba(32, 178, 170, 0.15) 0%, transparent 70%);
      color: #ffffff;
    }
    
    .gateway-content {
      text-align: center;
      z-index: 2;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .gateway-title {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }
    
    .gateway-desc {
      font-size: 1.1rem;
      opacity: 0.7;
      max-width: 300px;
      margin: 0 auto;
      line-height: 1.5;
    }
    
    .agent-title {
      background: linear-gradient(135deg, #20b2aa, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Center Badge */
    .gateway-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    @media (max-width: 768px) {
      .gateway-container {
        flex-direction: column;
      }
      .classic-side {
        border-right: none;
        border-bottom: 1px solid rgba(0,0,0,0.1);
      }
      .gateway-title { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="gateway-badge">OR</div>
  <div class="gateway-container">
    <a href="{{ '/classic/' | relative_url }}" class="gateway-side classic-side">
      <div class="gateway-content">
        <h2 class="gateway-title">Classic<br>Portfolio</h2>
        <p class="gateway-desc">A clean, traditional view of my projects and experience.</p>
      </div>
    </a>
    <a href="{{ '/agent/' | relative_url }}" class="gateway-side agent-side">
      <div class="gateway-content">
        <h2 class="gateway-title agent-title">AI Agent<br>Experience</h2>
        <p class="gateway-desc">Interact with my AI agent to discover how I build massive data systems.</p>
      </div>
    </a>
  </div>
</body>
</html>
