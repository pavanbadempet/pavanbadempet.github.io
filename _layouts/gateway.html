<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pavan Badempet | Choose Your Experience</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body, html {
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background-color: #050505;
      color: #fff;
    }
    
    .gateway-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Shared styles for both sides */
    .gateway-side {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      transition: clip-path 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Left Side: Classic */
    .classic-side {
      background: #0a0e17;
      background-image: radial-gradient(circle at 20% 30%, rgba(0, 102, 255, 0.15) 0%, transparent 60%);
      z-index: 1;
      align-items: flex-start;
      padding-left: 15vw;
    }
    
    /* Right Side: Agent */
    .agent-side {
      background: #0a1411;
      background-image: radial-gradient(circle at 80% 70%, rgba(0, 255, 204, 0.15) 0%, transparent 60%);
      z-index: 2;
      align-items: flex-end;
      padding-right: 15vw;
      /* Default split */
      clip-path: polygon(55% 0, 100% 0, 100% 100%, 45% 100%);
    }

    /* Content styling */
    .gateway-content {
      z-index: 3;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      max-width: 400px;
    }
    
    .classic-side .gateway-content {
      transform: translateX(-20px);
    }
    
    .agent-side .gateway-content {
      text-align: right;
      transform: translateX(20px);
    }
    
    .gateway-title {
      font-size: 4rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }
    
    .gateway-desc {
      font-size: 1.2rem;
      opacity: 0.6;
      line-height: 1.6;
    }
    
    .classic-title {
      color: #fff;
    }
    
    .agent-title {
      background: linear-gradient(135deg, #00ffcc, #0088ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Hover Effects */
    /* When Classic is hovered, push Agent right */
    .classic-side:hover {
      background-image: radial-gradient(circle at 20% 30%, rgba(0, 102, 255, 0.25) 0%, transparent 60%);
    }
    .classic-side:hover ~ .agent-side {
      clip-path: polygon(65% 0, 100% 0, 100% 100%, 55% 100%);
    }
    .classic-side:hover .gateway-content {
      transform: translateX(0px) scale(1.02);
    }

    /* When Agent is hovered, pull Agent left */
    .agent-side:hover {
      clip-path: polygon(45% 0, 100% 0, 100% 100%, 35% 100%);
      background-image: radial-gradient(circle at 80% 70%, rgba(0, 255, 204, 0.25) 0%, transparent 60%);
    }
    .agent-side:hover .gateway-content {
      transform: translateX(0px) scale(1.02);
    }
    
    /* Center Badge (Glassmorphism) */
    .gateway-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.1em;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    
    /* Divider line mimicking a laser */
    .laser-divider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      /* Default line */
      clip-path: polygon(calc(55% - 1px) 0, calc(55% + 1px) 0, calc(45% + 1px) 100%, calc(45% - 1px) 100%);
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: clip-path 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .classic-side:hover ~ .laser-divider {
      clip-path: polygon(calc(65% - 1px) 0, calc(65% + 1px) 0, calc(55% + 1px) 100%, calc(55% - 1px) 100%);
    }

    .agent-side:hover ~ .laser-divider {
      clip-path: polygon(calc(45% - 1px) 0, calc(45% + 1px) 0, calc(35% + 1px) 100%, calc(35% - 1px) 100%);
    }
    
    @media (max-width: 768px) {
      .classic-side {
        padding-left: 20px;
        align-items: center;
      }
      .agent-side {
        padding-right: 20px;
        align-items: center;
        /* Horizontal split on mobile */
        clip-path: polygon(0 55%, 100% 45%, 100% 100%, 0 100%);
      }
      .classic-side .gateway-content {
        transform: translateY(-20px);
        text-align: center;
      }
      .agent-side .gateway-content {
        transform: translateY(20px);
        text-align: center;
      }
      .laser-divider {
        clip-path: polygon(0 calc(55% - 1px), 100% calc(45% - 1px), 100% calc(45% + 1px), 0 calc(55% + 1px));
      }
      /* Hover states for mobile */
      .classic-side:hover ~ .agent-side {
        clip-path: polygon(0 65%, 100% 55%, 100% 100%, 0 100%);
      }
      .classic-side:hover ~ .laser-divider {
        clip-path: polygon(0 calc(65% - 1px), 100% calc(55% - 1px), 100% calc(55% + 1px), 0 calc(65% + 1px));
      }
      .agent-side:hover {
        clip-path: polygon(0 45%, 100% 35%, 100% 100%, 0 100%);
      }
      .agent-side:hover ~ .laser-divider {
        clip-path: polygon(0 calc(45% - 1px), 100% calc(35% - 1px), 100% calc(35% + 1px), 0 calc(45% + 1px));
      }
      .gateway-title { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="gateway-container">
    <a href="{{ '/classic/' | relative_url }}" class="gateway-side classic-side">
      <div class="gateway-content">
        <h2 class="gateway-title classic-title">Classic<br>Portfolio</h2>
        <p class="gateway-desc">A clean, traditional view of my engineering experience and projects.</p>
      </div>
    </a>
    
    <a href="{{ '/agent/' | relative_url }}" class="gateway-side agent-side">
      <div class="gateway-content">
        <h2 class="gateway-title agent-title">AI Agent<br>Experience</h2>
        <p class="gateway-desc">Interact with my AI advocate to discover how I build massive data systems.</p>
      </div>
    </a>
    
    <!-- Visual divider and badge -->
    <div class="laser-divider"></div>
    <div class="gateway-badge">OR</div>
  </div>
</body>
</html>
