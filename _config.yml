# basic settings
title: "Pavan Badempet | Data Engineer"
title_separator: "|"
email: "pavan9b@gmail.com"
description: "Data Engineer specializing in Python, Spark, AWS, and AI/ML. Building scalable data platforms and production-grade applications."
keywords: "Data Engineer, Python, Apache Spark, AWS, ETL, Machine Learning, Resume, Portfolio, TCS, Big Data"
author: "Pavan Badempet"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://pavanbadempet.github.io" # the base hostname & protocol for your site, e.g. http://example.com
image: "https://pavanbadempet.github.io/assets/img/pavan.png"
twitter:
  card: summary_large_image
  username: "pavanbadempet"
github:
  username: "pavanbadempet"
social:
  name: "Pavan Badempet"
  links:
    - "https://twitter.com/pavanbadempet"
    - "https://github.com/pavanbadempet"
    - "https://linkedin.com/in/pavanbadempet"
date_format: "%d %B %Y"

# paginations & permalinks
paginate: 9
paginate_path: "/blog/page:num/"
permalink: pretty

# disqus comments
disqus_comments: "no" # yes - show disqus comments, no - hide disqus comments
disqus_shortname: "pavanbadempet" # read more here https://help.disqus.com/customer/portal/articles/466208-what-s-a-shortname-

# formsubmit.io
formsubmit_email: "pavan9b@gmail.com" # sign up on https://formsubmit.io/ and confirm your email

# Command palette AI (optional backends — see cloudflare-worker/portfolio-ai/README.md)
# Leave ai_worker_url empty to disable Worker proxy. For Ollama on GitHub Pages, set ollama_base_url to an https tunnel.
ai_worker_url: "" # e.g. https://portfolio-ai.your-account.workers.dev
ai_worker_model: "gpt-4o-mini"
ollama_default_model: "llama3.2"
# HTTPS tunnel or reverse-proxy base for Ollama (no trailing /api/chat). Required for GitHub Pages (https)
# because http://127.0.0.1:11434 is blocked as mixed content. Examples: https://ollama.example.com or a trycloudflare URL.
ollama_base_url: ""
webllm_default_model: "Llama-3.2-1B-Instruct-q4f16_1-MLC"
# RAG + generation (used by assets/js/ai-engine.js via #cp-ai-config)
ai_retrieval_k: 8
ai_temperature: 0.42
ai_contract_version: "portfolio-ai-v2"

# collections
collections:
  - works

# archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive
#     tag: archive
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/

# Build settings
plugins:
  # - jekyll-archives
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - cloudflare-worker/
  - scripts/

sass:
  style: compressed

markdown:  kramdown