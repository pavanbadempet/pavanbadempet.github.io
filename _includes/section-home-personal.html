{% assign content = site.data.home['started-personal'] %}

<!-- Section Started -->
<div class="section started personal" id="section-started">

    <!-- background -->
    <div class="video-bg">
        <div class="video-bg-mask"></div>
        <div class="video-bg-texture" id="grained_container"></div>
    </div>

    <!-- started content -->
    <div class="centrize full-width">
        <div class="vertical-center">
            <div class="started-content">
                {% if content.image != '' %}
                <div class="logo" style="background-image: url({{ content.image | relative_url }});"></div>
                {% endif %}
                {% if content.title != '' %}
                <h1 class="h-title">
                    {{ content.title }}
                </h1>
                {% endif %}
                <h2 class="h-subtitle typing-subtitle">
                    {% for item in content.typed %}
                    <p>{{ item }}</p>
                    {% endfor %}
                </h2>
                <span class="typed-subtitle"></span>
                <div class="ai-hint" style="margin-top: 25px; font-size: 15px; opacity: 0.8; animation: fadeIn 2s ease-in-out;">
                    <span style="border: 1px solid rgba(255,255,255,0.3); padding: 6px 10px; border-radius: 6px; background: rgba(75,255,165,0.1); cursor: pointer;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'key':'k', 'ctrlKey':true})); return false;">
                        <i class="fas fa-robot" style="margin-right: 5px; color: #4bffa5;"></i> Press <kbd style="font-family: 'Fira Code', monospace; color: #fff;">Ctrl + K</kbd> to ask my AI assistant
                    </span>
                </div>
            </div>
        </div>
    </div>

</div>
