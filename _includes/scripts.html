<!-- Async Script Loader & PWA -->
<script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js').then(registration => {
                // console.log('SW registered: ', registration);
            }).catch(registrationError => {
                // console.log('SW registration failed: ', registrationError);
            });
        });
    }

    function loadScript(src) {
        return new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
        });
    }

    (function () {
        var needJarallax = !!document.querySelector(
            '.jarallax, [data-jarallax], .jarallax-video, [data-jarallax-video], [data-jarallax-element]'
        );
        var needSwiper = !!document.querySelector('.started-carousel, .reviews-carousel');
        var needPortfolio = !!document.querySelector('.portfolio-items');
        var needSearch = !!(document.getElementById('search-input') && document.getElementById('results-container'));
        var needMermaid = !!document.querySelector('.mermaid');
        var needSocialShare = !!document.querySelector('.social-share');

        var coreAfterJquery = [
            loadScript("https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"),
            loadScript("{{ 'assets/js/typed.js' | relative_url }}"),
            loadScript("https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"),
            loadScript("{{ 'assets/js/data-particles.js' | relative_url }}")
        ];

        if (needJarallax) {
            coreAfterJquery.push(
                loadScript("{{ 'assets/js/jarallax.js' | relative_url }}"),
                loadScript("{{ 'assets/js/jarallax-video.js' | relative_url }}"),
                loadScript("{{ 'assets/js/jarallax-element.js' | relative_url }}")
            );
        }
        if (needPortfolio) {
            coreAfterJquery.push(
                loadScript("{{ 'assets/js/imagesloaded.pkgd.js' | relative_url }}"),
                loadScript("https://cdnjs.cloudflare.com/ajax/libs/jquery.isotope/3.0.6/isotope.pkgd.min.js"),
                loadScript("{{ 'assets/js/simpleParallax.js' | relative_url }}")
            );
        }
        if (needSwiper) {
            coreAfterJquery.push(loadScript("https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"));
        }
        if (needSocialShare) {
            coreAfterJquery.push(loadScript("{{ 'assets/js/rrssb.js' | relative_url }}"));
        }

        loadScript("https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js")
            .then(function () {
                return Promise.all(coreAfterJquery);
            })
            .then(function () {
                var chain = Promise.resolve();
                if (needSearch) {
                    chain = chain.then(function () {
                        return loadScript("{{ 'assets/js/simple-jekyll-search.js' | relative_url }}");
                    });
                }
                if (needMermaid) {
                    chain = chain.then(function () {
                        return loadScript("https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js").then(function () {
                            if (typeof mermaid !== 'undefined') {
                                mermaid.initialize({ startOnLoad: true, theme: 'dark' });
                            }
                        });
                    });
                }
                return chain;
            })
            .then(function () {
                return loadScript("{{ 'assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}");
            })
            .catch(function (error) {
                console.error('Script loading failed:', error);
            });
    })();

    // Dynamic "Miss You" Title (Recruiter Delight)
    (function () {
        var originalTitle = document.title;
        var hiddenTitle = "Hire Me? 👀";

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                document.title = hiddenTitle;
            } else {
                document.title = originalTitle;
            }
        });
    })();
</script>
