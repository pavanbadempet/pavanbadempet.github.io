<!-- Command Palette Modal -->
<div id="command-palette" class="command-palette-overlay" style="display: none;">
    <div class="command-palette-modal">
        <div class="cp-header">
            <div class="cp-mode-icon">
                <i class="fas fa-sparkles" id="cp-mode-icon"></i>
            </div>
            <input type="text" id="cp-input" placeholder="Ask AI about Pavan... (or type / for commands)"
                autocomplete="off">
            <div class="cp-actions">
                <span id="cp-status-tag" class="cp-status-tag">AI Active</span>
                <span class="cp-esc">ESC</span>
            </div>
        </div>

        <div class="cp-ai-toolbar">
            <label for="cp-ai-provider" class="cp-ai-label">Inference</label>
            <select id="cp-ai-provider" aria-label="AI inference provider">
                <option value="pollinations">Cloud — Pollinations (free)</option>
                <option value="worker" {% unless site.ai_worker_url %}disabled{% endunless %}>Cloud — your Worker (OpenAI-compatible)</option>
                <option value="ollama">Ollama (local http, or https tunnel via ollama_base_url)</option>
                <option value="webllm">Browser — WebGPU / WebLLM (large one-time download)</option>
            </select>
        </div>

        <div class="cp-body">
            <!-- Chat Mode Container -->
            <div id="cp-chat-container">
                <div class="cp-message bot">
                    <div class="cp-avatar"><i class="fas fa-robot"></i></div>
                    <div class="cp-text">Hello! I'm Pavan's AI Assistant. Ask me anything about his projects, skills, or
                        experience.</div>
                </div>
            </div>

            <!-- Command Mode Container (Hidden by default) -->
            <div id="cp-commands-container" style="display:none;">
                <div class="cp-section">Navigation</div>
                <a href="{{ '/portfolio/' | relative_url }}" class="cp-item" data-tags="projects portfolio work code">
                    <i class="fas fa-layer-group"></i>
                    <span>Go to Projects</span>
                    <span class="cp-shortcut">P</span>
                </a>
                <a href="{{ '/resume/' | relative_url }}" class="cp-item" data-tags="resume cv experience job work">
                    <i class="fas fa-file-alt"></i>
                    <span>Go to Resume</span>
                    <span class="cp-shortcut">R</span>
                </a>
                <a href="{{ '/contacts/' | relative_url }}" class="cp-item" data-tags="contact email phone hire">
                    <i class="fas fa-paper-plane"></i>
                    <span>Contact Me</span>
                    <span class="cp-shortcut">C</span>
                </a>
                <a href="{{ '/' | relative_url }}" class="cp-item" data-tags="home start landing">
                    <i class="fas fa-home"></i>
                    <span>Go Home</span>
                    <span class="cp-shortcut">H</span>
                </a>

                <!-- Search Results Placeholder -->
                <div id="cp-search-results"></div>

                <div class="cp-section">Actions</div>
                <div class="cp-item" id="cp-copy-email" data-tags="email copy mail">
                    <i class="fas fa-envelope"></i>
                    <span>Copy Email</span>
                </div>
                <a href="https://drive.google.com/file/d/1gppjKAn5s9W06uH4ajoj7Ha2H13zEPkq/view?usp=sharing"
                    target="_blank" class="cp-item" onclick="togglePalette();" data-tags="resume cv pdf download">
                    <i class="fas fa-file-pdf"></i>
                    <span>View Resume PDF</span>
                </a>
            </div>
        </div>
        <div class="cp-footer">
            <span></span>
            <span class="cp-hint">Type <b>/</b> to switch modes</span>
        </div>
    </div>
</div>

<script type="application/json" id="cp-ai-config">
    {
        "workerUrl": {{ site.ai_worker_url | default: '' | jsonify }},
        "workerModel": {{ site.ai_worker_model | default: 'gpt-4o-mini' | jsonify }},
        "ollamaModel": {{ site.ollama_default_model | default: 'llama3.2' | jsonify }},
        "ollamaBaseUrl": {{ site.ollama_base_url | default: '' | jsonify }},
        "webllmModel": {{ site.webllm_default_model | default: 'Llama-3.2-1B-Instruct-q4f16_1-MLC' | jsonify }},
        "chunksUrl": {{ '/ai_chunks.json' | relative_url | jsonify }},
        "siteCard": {{ site.description | jsonify }},
        "retrievalK": {{ site.ai_retrieval_k | default: 8 }},
        "temperature": {{ site.ai_temperature | default: 0.42 }},
        "contractVersion": {{ site.ai_contract_version | default: 'portfolio-ai-v2' | jsonify }},
        "aiFacts": {% if site.data.ai_facts %}{{ site.data.ai_facts | jsonify }}{% else %}null{% endif %}
    }
</script>
<script src="{{ '/assets/js/ai-engine.js' | relative_url }}" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

<style>

<script defer>
    const AI_PROVIDER_KEY = 'cp-ai-provider-v1';
    let paletteState = { isOpen: false, mode: 'ai', selectedIndex: 0 };
    let aiChunks = [];
    let aiContextLoaded = false;
    let chatHistory = [];

    function readStoredProvider() {
        try {
            return localStorage.getItem(AI_PROVIDER_KEY) || 'pollinations';
        } catch (e) {
            return 'pollinations';
        }
    }

    function getAiProvider() {
        const sel = document.getElementById('cp-ai-provider');
        if (sel && sel.value) return sel.value;
        return readStoredProvider();
    }

    function setAiProviderUi(value) {
        const sel = document.getElementById('cp-ai-provider');
        if (!sel) return;
        const opt = sel.querySelector('option[value="' + value + '"]');
        if (opt && !opt.disabled) sel.value = value;
        else sel.value = 'pollinations';
    }

    // --- Core Functions ---
    function togglePalette() {
        const palette = document.getElementById('command-palette');
        const input = document.getElementById('cp-input');
        if (paletteState.isOpen) {
            palette.classList.remove('open');
            setTimeout(() => { palette.style.display = 'none'; }, 200);
            document.body.style.overflow = '';
        } else {
            palette.style.display = 'flex';
            void palette.offsetWidth;
            palette.classList.add('open');
            input.value = '';
            input.focus();
            document.body.style.overflow = 'hidden';
            setMode('ai');
            if (!aiContextLoaded) loadContext();
        }
        paletteState.isOpen = !paletteState.isOpen;
    }

    function setMode(mode) {
        paletteState.mode = mode;
        const icon = document.getElementById('cp-mode-icon');
        const chatContainer = document.getElementById('cp-chat-container');
        const cmdContainer = document.getElementById('cp-commands-container');
        const status = document.getElementById('cp-status-tag');
        const input = document.getElementById('cp-input');

        if (mode === 'ai') {
            icon.className = 'fas fa-sparkles';
            chatContainer.style.display = 'flex';
            cmdContainer.style.display = 'none';
            status.textContent = 'AI Active';
            status.style.background = '#4bffa5';
            status.style.color = '#000';
            status.style.boxShadow = '0 0 10px rgba(75, 255, 165, 0.3)';
            input.placeholder = "Ask AI about Pavan... (or type / for commands)";
        } else {
            icon.className = 'fas fa-search';
            chatContainer.style.display = 'none';
            cmdContainer.style.display = 'block';
            status.textContent = 'CMD Mode';
            status.style.background = '#007acc';
            input.placeholder = "Search commands... (backspace to clear /)";
        }
    }

    async function loadContext() {
        try {
            const fetchUrl = '{{ "/ai_chunks.json" | relative_url }}?v=' + Date.now();
            const response = await fetch(fetchUrl);
            aiChunks = await response.json();
            if (!Array.isArray(aiChunks)) aiChunks = [];
        } catch (e) {
            console.error('ai_chunks load failed', e);
            aiChunks = [];
        }
        aiContextLoaded = true;
    }

    async function performSearch(query) {
        const out = document.getElementById('cp-search-results');
        if (!out) return;
        const q = (query || '').trim().toLowerCase();
        if (q.length < 2) {
            out.innerHTML = '';
            return;
        }
        try {
            const response = await fetch('{{ "/search.json" | relative_url }}?v=' + Date.now());
            const items = await response.json();
            const hits = items.filter(function (it) {
                const t = (it.title || '').toLowerCase();
                const tg = (it.tags || '').toLowerCase();
                const c = (it.content || '').toLowerCase();
                return t.includes(q) || tg.includes(q) || c.includes(q);
            }).slice(0, 8);
            out.innerHTML = hits.map(function (it) {
                return '<a class="cp-item cp-search-result" href="' + escapeHtml(it.url) + '"><i class="fas fa-link"></i><span>' + escapeHtml(it.title) + '</span></a>';
            }).join('');
        } catch (e) {
            out.innerHTML = '';
        }
    }

    // --- Event Listeners ---
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('cp-input');
        const prov = document.getElementById('cp-ai-provider');
        if (prov) {
            setAiProviderUi(readStoredProvider());
            prov.addEventListener('change', () => {
                const v = prov.value;
                try { localStorage.setItem(AI_PROVIDER_KEY, v); } catch (e3) { }
                if (v !== 'webllm' && window.PortfolioAI) PortfolioAI.disposeWebLlm();
            });
        }

        input.addEventListener('input', (e) => {
            const val = e.target.value;

            if (paletteState.mode === 'ai' && val.startsWith('/')) {
                setMode('command');
                input.value = '';
            } else if (paletteState.mode === 'command' && val === '' && e.inputType === 'deleteContentBackward') {
                setMode('ai');
            }

            if (paletteState.mode === 'command') {
                const query = val.toLowerCase();
                document.querySelectorAll('.cp-item:not(.cp-search-result)').forEach(item => {
                    const text = item.innerText.toLowerCase();
                    const tags = item.getAttribute('data-tags') || '';
                    item.classList.toggle('hidden', !(text.includes(query) || tags.includes(query)));
                });
                performSearch(query);
            }
        });

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (paletteState.mode === 'command') {
                    const visible = document.querySelector('.cp-item:not(.hidden)') || document.querySelector('.cp-search-result');
                    if (visible) visible.click();
                } else {
                    handleUserMessage(input.value);
                    input.value = '';
                }
            }
            if (e.key === 'Escape') {
                togglePalette();
            }
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                togglePalette();
            }
        });

        const copyEmailBtn = document.getElementById('cp-copy-email');
        if (copyEmailBtn) {
            copyEmailBtn.addEventListener('click', () => {
                navigator.clipboard.writeText("pavan9b@gmail.com").then(() => {
                    togglePalette();
                });
            });
        }
    });

    async function handleUserMessage(msg) {
        if (!msg.trim()) return;
        if (!window.PortfolioAI) {
            addUserMessage(msg);
            addBotMessage('AI engine failed to load. Check that **assets/js/ai-engine.js** is deployed.');
            return;
        }

        addUserMessage(msg);
        const thinkingId = addThinking();
        const thinkingRow = document.getElementById(thinkingId);
        const thinkingTextEl = thinkingRow ? thinkingRow.querySelector('.cp-text') : null;

        try {
            if (!aiContextLoaded) await loadContext();
            const cfg = PortfolioAI.getConfig();
            PortfolioAI.setCorpus(aiChunks);
            var k = typeof cfg.retrievalK === 'number' ? cfg.retrievalK : 8;
            const retrieved = PortfolioAI.retrieveTopK(msg, k);
            const system = PortfolioAI.buildSystemPrompt(retrieved, cfg);
            const provider = getAiProvider();
            const historyTrim = chatHistory.slice(-10);
            const messages = [{ role: 'system', content: system }].concat(historyTrim).concat([{ role: 'user', content: msg }]);

            const onProgress = provider === 'webllm'
                ? function (report) {
                    if (thinkingTextEl) {
                        const pct = Math.round(((report && report.progress) || 0) * 100);
                        thinkingTextEl.textContent = (report && report.text ? report.text : 'Loading model') + ' (' + pct + '%)';
                    }
                }
                : null;

            const answer = await PortfolioAI.callProvider({ provider: provider, messages: messages, onProgress: onProgress });

            removeMessage(thinkingId);
            const botEl = addBotMessage(answer);
            renderCpRetrievalBar(botEl);
            chatHistory.push({ role: 'user', content: msg });
            chatHistory.push({ role: 'assistant', content: answer });
        } catch (error) {
            removeMessage(thinkingId);
            addBotMessage('**Error:** ' + error.message);
        }
    }

    function renderCpRetrievalBar(botMessageEl) {
        if (!window.PortfolioAI || !botMessageEl) return;
        const src = PortfolioAI.getLastSources();
        if (!src || !src.length) return;
        const bar = document.createElement('div');
        bar.className = 'cp-retrieval-bar';
        bar.setAttribute('aria-label', 'Retrieval sources');
        var parts = ['<span class="cp-retrieval-label">Grounded with</span>'];
        for (var i = 0; i < src.length; i++) {
            var s = src[i];
            var href = encodeURI(String(s.url || '#'));
            parts.push(
                '<a class="cp-chip" href="' +
                    href.replace(/"/g, '%22') +
                    '">[' +
                    s.index +
                    '] ' +
                    escapeHtml(String(s.title || '')) +
                    '</a>'
            );
        }
        bar.innerHTML = parts.join('');
        botMessageEl.appendChild(bar);
    }

    function addUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'cp-message user';
        div.innerHTML = `<div class="cp-avatar"><i class="fas fa-user"></i></div><div class="cp-text">${escapeHtml(text)}</div>`;
        document.getElementById('cp-chat-container').appendChild(div);
        scrollToBottom();
    }

    function addBotMessage(markdown) {
        const div = document.createElement('div');
        div.className = 'cp-message bot';
        const html = typeof marked !== 'undefined' && marked.parse ? marked.parse(markdown) : escapeHtml(markdown);
        div.innerHTML = `<div class="cp-avatar"><i class="fas fa-robot"></i></div><div class="cp-text">${html}</div>`;
        document.getElementById('cp-chat-container').appendChild(div);
        scrollToBottom();
        return div;
    }

    function addThinking() {
        const id = 'thinking-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'cp-message bot';
        div.innerHTML = `<div class="cp-avatar"><i class="fas fa-robot"></i></div>
            <div class="cp-text"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
        document.getElementById('cp-chat-container').appendChild(div);
        scrollToBottom();
        return id;
    }

    function removeMessage(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function scrollToBottom() {
        const container = document.querySelector('.cp-body');
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
