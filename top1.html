---
layout: top1
permalink: /top1/
---

{% assign content = site.data.home['started-personal'] %}

<div class="bento-card profile-card">
    <img src="{{ content.image | relative_url }}" alt="Pavan Badempet" class="profile-avatar">
    <h1 class="profile-name">PAVAN<br>BADEMPET.</h1>
    <div class="profile-title">Data & AI Engineer</div>
    <div class="profile-desc">
        {{ content.title }}
    </div>
</div>

<div class="right-col">
    
    <div class="ai-search-wrapper top1-inline-ai">
        <div class="ai-search-title">Portfolio AI Assistant</div>
        {%- include command-palette.html -%}
    </div>

    <div class="metrics-grid">
        {% for item in content.typed %}
        <div class="bento-card metric-card">
            <div class="metric-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="metric-text">
                {{ item }}
            </div>
        </div>
        {% endfor %}
    </div>

</div>
